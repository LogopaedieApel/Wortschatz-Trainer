<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Wortschatz-Editor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Die neue Editor-Anwendung wird hier von JavaScript gerendert -->
    </div>

    <script>
        // Fügt einen Zeitstempel an das Skript an, um Caching zu verhindern
        document.write(`<script src="editor_new_script.js?v=${new Date().getTime()}"><\/script>`);
    </script>
</body>
</html>
